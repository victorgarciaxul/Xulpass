<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Xulpass</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 360px;
      min-height: 520px;
      max-height: 620px;
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0c12;
      color: #fff;
      border-radius: 20px;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Ambient glow background */
    body::before {
      content: '';
      position: fixed;
      top: -80px; left: -60px;
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(220,38,38,0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -60px; right: -40px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(124,58,237,0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ════════════════════════════
       LOGIN
    ════════════════════════════ */
    #screen-login {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 28px;
      gap: 28px;
      position: relative;
      z-index: 1;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #dc2626, #991b1b);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 12px 32px rgba(220,38,38,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .logo-name {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 60%, #9ca3af);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-name em { color: #ef4444; font-style: normal; -webkit-text-fill-color: #ef4444; }
    .logo-sub { font-size: 11px; color: #374151; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; }

    .login-card {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 22px;
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .field-group { display: flex; flex-direction: column; gap: 6px; }

    .field-label {
      font-size: 10px;
      font-weight: 700;
      color: #4b5563;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"],
    select,
    textarea {
      width: 100%;
      height: 42px;
      padding: 0 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      color: #f9fafb;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    textarea { height: 72px; padding: 10px 14px; resize: none; line-height: 1.5; }

    select { cursor: pointer; }
    select option { background: #13151c; }

    input:focus, select:focus, textarea:focus {
      border-color: rgba(220,38,38,0.5);
      background: rgba(220,38,38,0.04);
      box-shadow: 0 0 0 3px rgba(220,38,38,0.08);
    }

    input::placeholder, textarea::placeholder { color: #2d3748; }

    #login-error {
      font-size: 12px;
      color: #f87171;
      min-height: 14px;
      font-weight: 500;
    }

    .btn-primary {
      width: 100%;
      height: 42px;
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(220,38,38,0.3);
      letter-spacing: 0.02em;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(220,38,38,0.4);
    }

    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ════════════════════════════
       VAULT
    ════════════════════════════ */
    #screen-vault {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .vault-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
    }

    .vault-logo {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #fff 60%, #9ca3af);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .vault-logo em { -webkit-text-fill-color: #ef4444; font-style: normal; }

    .header-actions { display: flex; align-items: center; gap: 6px; }

    .pill-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      height: 28px;
      padding: 0 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #9ca3af;
    }

    .pill-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }
    #btn-open-web:hover { color: #a78bfa; border-color: rgba(167,139,250,0.3); background: rgba(167,139,250,0.08); }
    #btn-logout:hover { color: #f87171; border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.08); }

    /* Search */
    .search-wrap {
      padding: 12px 14px 0;
      flex-shrink: 0;
    }

    .search-inner {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #374151;
      font-size: 13px;
      pointer-events: none;
    }

    #search-input {
      padding-left: 36px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 5px;
      padding: 10px 14px;
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      height: 26px;
      padding: 0 11px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      color: #4b5563;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab-btn:hover { color: #9ca3af; }

    .tab-btn.active {
      background: rgba(220,38,38,0.15);
      border-color: rgba(220,38,38,0.35);
      color: #f87171;
    }

    /* List header */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 16px 8px;
      flex-shrink: 0;
    }

    #count { font-size: 11px; color: #2d3748; font-weight: 500; }

    #btn-add-entry {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 26px;
      padding: 0 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      font-family: inherit;
      background: linear-gradient(135deg, rgba(220,38,38,0.2), rgba(220,38,38,0.1));
      border: 1px solid rgba(220,38,38,0.3);
      color: #f87171;
      cursor: pointer;
      transition: all 0.15s;
    }

    #btn-add-entry:hover {
      background: linear-gradient(135deg, rgba(220,38,38,0.3), rgba(220,38,38,0.2));
      box-shadow: 0 2px 12px rgba(220,38,38,0.2);
    }

    /* Entries */
    #entries-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 10px 12px;
      scrollbar-width: thin;
      scrollbar-color: #1f2937 transparent;
    }

    #entries-list::-webkit-scrollbar { width: 3px; }
    #entries-list::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 2px; }

    .empty {
      text-align: center;
      color: #1f2937;
      font-size: 13px;
      padding: 48px 20px;
      font-weight: 500;
    }

    .entry-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid transparent;
      margin-bottom: 4px;
      transition: all 0.15s;
      cursor: default;
    }

    .entry-card:hover {
      background: rgba(255,255,255,0.03);
      border-color: rgba(255,255,255,0.06);
    }

    .entry-icon {
      width: 38px; height: 38px;
      border-radius: 11px;
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .entry-icon img { width: 22px; height: 22px; object-fit: contain; }

    .fallback-icon {
      font-size: 15px; font-weight: 800; color: #fff;
      width: 38px; height: 38px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #dc2626 0%, #7c3aed 100%);
      border: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }

    .entry-info { flex: 1; min-width: 0; }

    .entry-title {
      font-size: 13px;
      font-weight: 600;
      color: #f3f4f6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .star { color: #fbbf24; font-size: 10px; }

    .entry-user {
      font-size: 11px;
      color: #4b5563;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
      font-weight: 500;
    }

    .entry-pwd {
      font-size: 11px;
      color: #1f2937;
      font-family: 'SF Mono', monospace;
      margin-top: 2px;
    }

    .pwd-text { color: #6b7280; }

    .entry-actions { display: flex; gap: 3px; flex-shrink: 0; }

    .btn-icon {
      width: 30px; height: 30px;
      border-radius: 9px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.03);
      font-size: 13px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.12s;
    }

    .btn-icon:hover {
      background: rgba(220,38,38,0.12);
      border-color: rgba(220,38,38,0.25);
      transform: scale(1.05);
    }

    .btn-autofill-item:hover {
      background: rgba(124,58,237,0.15);
      border-color: rgba(124,58,237,0.3);
    }

    /* ════════════════════════════
       ADD SCREEN
    ════════════════════════════ */
    #screen-add {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .add-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
    }

    .btn-back {
      width: 32px; height: 32px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      color: #9ca3af;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      font-family: inherit;
    }

    .btn-back:hover { color: #fff; background: rgba(255,255,255,0.08); }

    .add-header h2 { font-size: 15px; font-weight: 700; color: #f3f4f6; }

    .add-form {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: none;
    }

    .add-form::-webkit-scrollbar { display: none; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .pwd-row { display: flex; gap: 8px; align-items: flex-end; }
    .pwd-row .field-group { flex: 1; }

    .btn-gen {
      width: 42px; height: 42px; flex-shrink: 0;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      color: #9ca3af;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      font-family: inherit;
    }

    .btn-gen:hover {
      color: #fff;
      background: rgba(124,58,237,0.15);
      border-color: rgba(124,58,237,0.3);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #4b5563;
      font-weight: 500;
      cursor: pointer;
      padding: 2px 0;
    }

    .checkbox-row input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: #dc2626;
      cursor: pointer;
    }

    .add-footer {
      padding: 14px 16px;
      border-top: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
    }

    #save-error {
      font-size: 12px;
      color: #f87171;
      font-weight: 500;
      min-height: 16px;
      margin-bottom: 10px;
    }

    /* ════════════════════════════
       TOAST
    ════════════════════════════ */
    #toast {
      position: fixed;
      bottom: 14px; left: 50%;
      transform: translateX(-50%) translateY(50px);
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: #fff;
      font-size: 12px; font-weight: 700;
      padding: 8px 18px;
      border-radius: 20px;
      opacity: 0;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
      box-shadow: 0 4px 16px rgba(22,163,74,0.35);
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- ── LOGIN ── -->
  <div id="screen-login">
    <div class="logo-wrap">
      <div class="logo-icon">🔑</div>
      <div class="logo-name">Xulpass<em>···|</em></div>
      <div class="logo-sub">Tu gestor de contraseñas</div>
    </div>

    <div class="login-card">
      <div class="field-group">
        <div class="field-label">Email</div>
        <input id="input-email" type="email" placeholder="tu@xul.com" autocomplete="email" />
      </div>
      <div class="field-group">
        <div class="field-label">Contraseña</div>
        <input id="input-password" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <div id="login-error"></div>
      <button id="btn-login" class="btn-primary">Iniciar sesión</button>
    </div>
  </div>

  <!-- ── VAULT ── -->
  <div id="screen-vault" class="hidden">
    <div class="vault-header">
      <div class="vault-logo">Xulpass<em>···|</em></div>
      <div class="header-actions">
        <button id="btn-open-web" class="pill-btn">🌐 Web</button>
        <button id="btn-logout" class="pill-btn">Salir →</button>
      </div>
    </div>

    <div class="search-wrap">
      <div class="search-inner">
        <span class="search-icon">🔍</span>
        <input id="search-input" type="text" placeholder="Buscar..." />
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="all">Todos</button>
      <button class="tab-btn" data-tab="favorites">★ Favoritos</button>
      <button class="tab-btn" data-tab="web">Web</button>
      <button class="tab-btn" data-tab="app">App</button>
      <button class="tab-btn" data-tab="email">Email</button>
      <button class="tab-btn" data-tab="social">Social</button>
      <button class="tab-btn" data-tab="server">Server</button>
    </div>

    <div class="list-header">
      <span id="count">—</span>
      <button id="btn-add-entry">＋ Nueva</button>
    </div>

    <div id="entries-list"></div>
  </div>

  <!-- ── ADD ENTRY ── -->
  <div id="screen-add" class="hidden">
    <div class="add-header">
      <button class="btn-back" id="btn-back">←</button>
      <h2>Nueva contraseña</h2>
    </div>

    <div class="add-form">
      <div class="field-group">
        <div class="field-label">Título *</div>
        <input id="add-title" type="text" placeholder="ej. Gmail Agencia" />
      </div>

      <div class="field-group">
        <div class="field-label">Usuario / Email *</div>
        <input id="add-username" type="text" placeholder="usuario@ejemplo.com" />
      </div>

      <div class="pwd-row">
        <div class="field-group">
          <div class="field-label">Contraseña *</div>
          <input id="add-password" type="password" placeholder="••••••••" />
        </div>
        <button class="btn-gen" id="btn-gen" title="Generar contraseña segura">🎲</button>
      </div>

      <div class="form-row">
        <div class="field-group">
          <div class="field-label">URL</div>
          <input id="add-url" type="text" placeholder="https://..." />
        </div>
        <div class="field-group">
          <div class="field-label">Categoría</div>
          <select id="add-category">
            <option value="web">web</option>
            <option value="app">app</option>
            <option value="email">email</option>
            <option value="social">social</option>
            <option value="server">server</option>
            <option value="other">other</option>
          </select>
        </div>
      </div>

      <div class="field-group">
        <div class="field-label">Notas</div>
        <textarea id="add-notes" placeholder="Notas adicionales..."></textarea>
      </div>

      <label class="checkbox-row">
        <input type="checkbox" id="add-favorite" />
        Marcar como favorito ★
      </label>
    </div>

    <div class="add-footer">
      <div id="save-error"></div>
      <button id="btn-save" class="btn-primary">Guardar contraseña</button>
    </div>
  </div>

  <div id="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
